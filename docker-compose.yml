services:
  db:
    image: postgres:17
    container_name: bet-app
    restart: unless-stopped
    environment:
      POSTGRES_USER: tomeks
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: bet-app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
volumes:
  pgdata: